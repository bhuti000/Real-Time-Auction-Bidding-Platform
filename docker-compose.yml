version: "3.8"

services:
  # Database
  mongo:
    image: mongo:7.0
    container_name: rta-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - rta-network

  # Cache
  redis:
    image: redis:7.2
    container_name: rta-redis
    ports:
      - "6379:6379"
    networks:
      - rta-network

  # Backend API
  backend:
    build: ./backend
    container_name: rta-backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      # Override local .env values to use container hostnames
      - MONGO_URL=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - rta-network

  # Frontend Web App
  frontend:
    build: ./frontend
    container_name: rta-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - rta-network

networks:
  rta-network:
    driver: bridge

volumes:
  mongo_data:
